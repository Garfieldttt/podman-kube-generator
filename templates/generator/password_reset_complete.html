{% extends "base.html" %}
{% block title %}Password changed — Podman Kube Generator{% endblock %}
{% block meta_robots %}noindex, nofollow{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center mt-4">
    <i class="bi bi-check-circle" style="font-size:3rem;color:var(--accent);"></i>
    <h1 class="h4 mt-3">Password changed</h1>
    <p style="color:var(--text-dim);">Your password has been changed successfully. You can now log in.</p>
    <a href="/login/" class="btn btn-primary mt-2">To login</a>
  </div>
</div>
{% endblock %}
