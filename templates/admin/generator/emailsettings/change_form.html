{% extends "admin/change_form.html" %}
{% block submit_buttons_bottom %}
  {{ block.super }}
  {% if test_mail_url %}
  <div class="submit-row">
    <form method="post" action="{{ test_mail_url }}" style="display:inline-flex;align-items:center;gap:.5rem;">
      {% csrf_token %}
      <input type="email" name="recipient" placeholder="Empfänger (leer = Admin-E-Mail)"
        style="padding:.3rem .6rem;border:1px solid #ccc;border-radius:3px;font-size:.85rem;width:260px;">
      <button type="submit"
        style="padding:.35rem .9rem;background:#417690;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:.85rem;">
        Test-E-Mail senden
      </button>
    </form>
  </div>
  {% endif %}
{% endblock %}
