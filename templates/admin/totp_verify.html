{% extends "admin/base_site.html" %}
{% block title %}Zwei-Faktor-Authentifizierung{% endblock %}

{% block content %}
<div style="max-width:400px; margin:2rem auto;">
  <h1 style="font-size:1.4rem; margin-bottom:1rem;">Zwei-Faktor-Authentifizierung</h1>

  <p style="color:#666; margin-bottom:1.5rem;">
    Gib den aktuellen Code aus deiner Authenticator-App ein.
  </p>

  {% if error %}
  <p style="color:#ba2121; background:#fff0f0; border:1px solid #f5c6cb; padding:.6rem .9rem; border-radius:4px; margin-bottom:1rem;">
    {{ error }}
  </p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <label style="display:block; font-weight:600; margin-bottom:.4rem;">Authenticator-Code</label>
    <input type="text" name="code" inputmode="numeric" pattern="[0-9 ]*" maxlength="7"
           autocomplete="one-time-code" autofocus
           style="width:100%; padding:.6rem .75rem; font-size:1.2rem; letter-spacing:.25em;
                  border:1px solid {% if error %}#ba2121{% else %}#ccc{% endif %};
                  border-radius:4px; margin-bottom:1rem; box-sizing:border-box;">
    <button type="submit"
            style="width:100%; padding:.7rem; background:#417690; color:#fff;
                   border:none; border-radius:4px; font-size:1rem; cursor:pointer;">
      Bestätigen
    </button>
  </form>
</div>
{% endblock %}
